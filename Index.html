<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecossistema 369 - Tecnologia e Infoprodutos</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React e ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Tipografia e Cores Base de E-commerce */
        body { background-color: #F3F4F6; color: #111827; }
        
        /* Sombras suaves padrão Mercado Livre / Amazon */
        .card-shadow {
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.1), 0 1px 5px 0 rgba(0, 0, 0, 0.1);
            transition: box-shadow 0.2s ease-in-out, transform 0.2s ease;
        }
        .card-shadow:hover {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            transform: translateY(-2px);
        }

        /* Animação do Chatbot */
        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body class="font-sans antialiased">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [isChatOpen, setIsChatOpen] = useState(false);
            const [chatMessages, setChatMessages] = useState([]);
            const [isTyping, setIsTyping] = useState(false);
            const chatEndRef = useRef(null);
            
            const chatOptions = ['Dúvida sobre E-books', 'Planos do System369', 'Falar com Atendimento'];

            useEffect(() => {
                setChatMessages([{ sender: 'bot', text: 'Olá! Bem-vindo ao Ecossistema 369. Sou seu assistente virtual. Como posso ajudar nas suas compras hoje?' }]);
            }, []);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [chatMessages, isTyping]);

            const handleChatAction = (option) => {
                setChatMessages(prev => [...prev, { sender: 'user', text: option }]);
                setIsTyping(true);

                setTimeout(() => {
                    setIsTyping(false);
                    let botReply = '';
                    if (option.includes('E-books')) {
                        botReply = 'Todos os nossos e-books têm entrega imediata por e-mail após a confirmação do pagamento. Aproveite as ofertas de hoje logo abaixo!';
                    } else if (option.includes('Planos')) {
                        botReply = 'O System369 é perfeito para quem quer vender digitalmente. Temos planos a partir de R$ 49/mês. Quer agendar uma demonstração?';
                    } else {
                        botReply = 'Claro! Por favor, informe seu e-mail e nosso time (ou o próprio Maurício) entrará em contato em breve.';
                    }
                    setChatMessages(prev => [...prev, { sender: 'bot', text: botReply }]);
                }, 1000);
            };

            return (
                <div className="min-h-screen flex flex-col">
                    
                    {/* Header Padrão E-commerce (Azul Confiança) */}
                    <header className="fixed w-full top-0 z-50 bg-[#001E45] shadow-md">
                        <div className="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
                            {/* Logo */}
                            <a href="#inicio" className="flex items-center gap-2">
                                <svg className="w-8 h-8 text-[#00A650]" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                                </svg>
                                <span className="text-2xl font-black text-white tracking-tight">ECOSSISTEMA<span className="text-[#00A650]">369</span></span>
                            </a>
                            
                            {/* Busca (Gatilho de Marketplace) */}
                            <div className="hidden md:flex flex-1 max-w-xl mx-8">
                                <input type="text" placeholder="Buscar produtos, e-books e soluções..." className="w-full px-4 py-2 rounded-l-sm focus:outline-none text-gray-800" />
                                <button className="bg-gray-200 px-4 rounded-r-sm hover:bg-gray-300">
                                    <svg className="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                                </button>
                            </div>

                            <nav className="hidden md:flex items-center space-x-6 font-medium text-sm text-white">
                                <a href="#system369" className="hover:text-gray-300 transition-colors">SaaS</a>
                                <a href="#ebooks369" className="hover:text-gray-300 transition-colors">E-books</a>
                                <a href="#" className="flex items-center gap-1 hover:text-[#00A650]">
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                                    <span>Carrinho</span>
                                </a>
                            </nav>
                        </div>
                    </header>

                    {/* Espaçamento do Header Fixo */}
                    <div className="pt-20"></div>

                    {/* 1. ABA DE INÍCIO: O Criador & Soluções (Estilo Landing Page Corporativa) */}
                    <section id="inicio" className="bg-white border-b border-gray-200 py-16 px-4">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row items-center gap-12">
                            <div className="flex-1">
                                <div className="inline-block bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wide mb-4">
                                    Tecnologia e Educação
                                </div>
                                <h1 className="text-4xl md:text-5xl font-extrabold text-gray-900 leading-tight mb-4">
                                    Soluções escaláveis em <span className="text-[#0052CC]">SaaS</span> e <span className="text-[#0052CC]">Infoprodutos</span>.
                                </h1>
                                <p className="text-gray-600 text-lg mb-8">
                                    Desenvolvido por Maurício, estudante de Engenharia da Computação. O Ecossistema 369 une infraestrutura robusta para o seu negócio e conteúdos validados para o seu desenvolvimento.
                                </p>
                                <div className="flex gap-4">
                                    <a href="#ebooks369" className="bg-[#FF9900] text-gray-900 font-bold py-3 px-6 rounded-sm hover:bg-[#E68A00] transition-colors shadow-sm">
                                        Ver Loja de E-books
                                    </a>
                                    <a href="#system369" className="bg-gray-100 text-gray-800 border border-gray-300 font-bold py-3 px-6 rounded-sm hover:bg-gray-200 transition-colors">
                                        Conhecer SaaS
                                    </a>
                                </div>
                            </div>
                            
                            {/* Espaço para foto do Maurício ou Mockup de Produto */}
                            <div className="flex-1 w-full flex justify-center">
                                <div className="w-full max-w-md aspect-video bg-gray-100 rounded-lg border-2 border-dashed border-gray-300 flex items-center justify-center text-gray-400">
                                    [Imagem Corporativa / Mockup do Sistema Aqui]
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* 2. EBOOKS369: Infoprodutos (Estilo Mercado Livre / Amazon) */}
                    <section id="ebooks369" className="py-12 px-4 max-w-7xl mx-auto w-full">
                        <h2 className="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-2">
                            Ebooks<span className="text-[#0052CC]">369</span>
                            <span className="text-sm font-normal text-gray-500 ml-2">Mais vendidos hoje</span>
                        </h2>

                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                            
                            {/* Produto 1 */}
                            <div className="bg-white rounded-md p-4 card-shadow flex flex-col">
                                {/* Local EXATO onde a imagem do Ebook vai entrar */}
                                <div className="w-full aspect-[3/4] bg-gray-100 rounded-sm mb-4 flex items-center justify-center text-gray-400 border border-gray-200">
                                    [Capa Pão Artesanal]
                                </div>
                                <div className="flex-grow">
                                    <p className="text-xs text-gray-500 mb-1">Idioma: PT-PT</p>
                                    <h3 className="text-sm font-medium text-gray-800 mb-2 leading-snug hover:text-blue-600 cursor-pointer">
                                        E-book Pão Artesanal Caseiro: O Segredo da Tradição
                                    </h3>
                                    <div className="flex items-center gap-1 mb-2">
                                        <span className="text-yellow-400 text-sm">★★★★★</span>
                                        <span className="text-xs text-gray-400">(1.245)</span>
                                    </div>
                                    <div className="flex items-end gap-2 mb-4">
                                        <span className="text-2xl font-medium text-gray-900">R$ 19,90</span>
                                        <span className="text-xs text-green-600 font-medium mb-1">50% OFF</span>
                                    </div>
                                </div>
                                {/* Botão estilo e-commerce (alta conversão) */}
                                <button className="w-full bg-[#3483FA] text-white font-semibold py-2 rounded-sm hover:bg-[#2968C8] transition-colors">
                                    Comprar agora
                                </button>
                            </div>

                            {/* Produto 2 */}
                            <div className="bg-white rounded-md p-4 card-shadow flex flex-col">
                                <div className="w-full aspect-[3/4] bg-gray-100 rounded-sm mb-4 flex items-center justify-center text-gray-400 border border-gray-200">
                                    [Capa Relacionamentos]
                                </div>
                                <div className="flex-grow">
                                    <p className="text-xs text-gray-500 mb-1">Idioma: ES</p>
                                    <h3 className="text-sm font-medium text-gray-800 mb-2 leading-snug hover:text-blue-600 cursor-pointer">
                                        E-book Volver a Elegirnos: Reconstruye tu Relación
                                    </h3>
                                    <div className="flex items-center gap-1 mb-2">
                                        <span className="text-yellow-400 text-sm">★★★★☆</span>
                                        <span className="text-xs text-gray-400">(890)</span>
                                    </div>
                                    <div className="flex items-end gap-2 mb-4">
                                        <span className="text-2xl font-medium text-gray-900">R$ 24,90</span>
                                    </div>
                                </div>
                                <button className="w-full bg-[#3483FA] text-white font-semibold py-2 rounded-sm hover:bg-[#2968C8] transition-colors">
                                    Comprar ahora
                                </button>
                            </div>

                            {/* Produto Placeholder 3 */}
                            <div className="bg-white rounded-md p-4 card-shadow flex flex-col opacity-60">
                                <div className="w-full aspect-[3/4] bg-gray-50 rounded-sm mb-4 flex items-center justify-center text-gray-400 border border-gray-200">
                                    [Em Breve]
                                </div>
                                <div className="flex-grow">
                                    <h3 className="text-sm font-medium text-gray-800 mb-2">Novo Lançamento Programado</h3>
                                </div>
                                <button className="w-full bg-gray-200 text-gray-500 font-semibold py-2 rounded-sm cursor-not-allowed">
                                    Indisponível
                                </button>
                            </div>

                            {/* Produto Placeholder 4 */}
                            <div className="bg-white rounded-md p-4 card-shadow flex flex-col opacity-60">
                                <div className="w-full aspect-[3/4] bg-gray-50 rounded-sm mb-4 flex items-center justify-center text-gray-400 border border-gray-200">
                                    [Em Breve]
                                </div>
                                <div className="flex-grow">
                                    <h3 className="text-sm font-medium text-gray-800 mb-2">Novo Lançamento Programado</h3>
                                </div>
                                <button className="w-full bg-gray-200 text-gray-500 font-semibold py-2 rounded-sm cursor-not-allowed">
                                    Indisponível
                                </button>
                            </div>

                        </div>
                    </section>

                    {/* 3. SYSTEM369: SaaS e Automações (Estilo Startup / Tabela de Preços Clara) */}
                    <section id="system369" className="bg-white border-y border-gray-200 py-16 px-4">
                        <div className="max-w-7xl mx-auto">
                            <div className="text-center mb-12">
                                <h2 className="text-3xl font-bold text-gray-900 mb-4">System<span className="text-[#0052CC]">369</span> SaaS</h2>
                                <p className="text-gray-600 max-w-2xl mx-auto">Infraestrutura em nuvem, automação de dados e gestão de clientes focada no seu crescimento.</p>
                            </div>

                            <div className="grid md:grid-cols-3 gap-6 max-w-5xl mx-auto">
                                {/* Plano Básico */}
                                <div className="bg-white border border-gray-200 rounded-lg p-6 flex flex-col">
                                    <h3 className="text-lg font-semibold text-gray-900 mb-2">Starter</h3>
                                    <div className="mb-6"><span className="text-3xl font-bold text-gray-900">R$ 49</span><span className="text-gray-500 text-sm">/mês</span></div>
                                    <ul className="space-y-3 mb-8 text-gray-600 text-sm flex-grow">
                                        <li className="flex items-center gap-2"><svg className="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg> Até 100 clientes</li>
                                        <li className="flex items-center gap-2"><svg className="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg> Automação básica</li>
                                    </ul>
                                    <button className="w-full py-2 rounded-sm border border-[#0052CC] text-[#0052CC] font-semibold hover:bg-blue-50 transition-colors">Assinar Starter</button>
                                </div>

                                {/* Plano Pro */}
                                <div className="bg-white border-2 border-[#0052CC] rounded-lg p-6 flex flex-col relative shadow-lg transform md:-translate-y-2">
                                    <div className="absolute top-0 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-[#0052CC] text-white px-3 py-1 rounded-full text-xs font-bold uppercase">Mais Vendido</div>
                                    <h3 className="text-lg font-semibold text-gray-900 mb-2">Profissional</h3>
                                    <div className="mb-6"><span className="text-3xl font-bold text-[#0052CC]">R$ 97</span><span className="text-gray-500 text-sm">/mês</span></div>
                                    <ul className="space-y-3 mb-8 text-gray-600 text-sm flex-grow">
                                        <li className="flex items-center gap-2"><svg className="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg> Clientes Ilimitados</li>
                                        <li className="flex items-center gap-2"><svg className="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg> Dashboard Analítico</li>
                                        <li className="flex items-center gap-2"><svg className="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg> Integração API</li>
                                    </ul>
                                    <button className="w-full py-2 rounded-sm bg-[#0052CC] text-white font-semibold hover:bg-blue-800 transition-colors">Testar Grátis</button>
                                </div>

                                {/* Plano Enterprise */}
                                <div className="bg-white border border-gray-200 rounded-lg p-6 flex flex-col">
                                    <h3 className="text-lg font-semibold text-gray-900 mb-2">Corporativo</h3>
                                    <div className="mb-6"><span className="text-3xl font-bold text-gray-900">R$ 297</span><span className="text-gray-500 text-sm">/mês</span></div>
                                    <ul className="space-y-3 mb-8 text-gray-600 text-sm flex-grow">
                                        <li className="flex items-center gap-2"><svg className="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg> Servidor Dedicado</li>
                                        <li className="flex items-center gap-2"><svg className="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg> Personalização</li>
                                    </ul>
                                    <button className="w-full py-2 rounded-sm border border-gray-300 text-gray-700 font-semibold hover:bg-gray-50 transition-colors">Falar com Consultor</button>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Footer Clean */}
                    <footer className="bg-white border-t border-gray-200 py-8">
                        <div className="max-w-7xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="text-sm text-gray-500">
                                &copy; 2026 Ecossistema 369. Desenvolvido por Maurício. Todos os direitos reservados.
                            </div>
                            <div className="flex items-center gap-4">
                                <a href="https://instagram.com/ebooks_369" target="_blank" className="text-gray-400 hover:text-gray-900 transition-colors flex items-center gap-1 text-sm">
                                    <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
                                    @ebooks_369
                                </a>
                                <img src="https://logodownload.org/wp-content/uploads/2014/07/mastercard-logo.png" alt="Mastercard" className="h-4 grayscale opacity-50" />
                                <img src="https://logodownload.org/wp-content/uploads/2016/10/visa-logo-1.png" alt="Visa" className="h-3 grayscale opacity-50" />
                            </div>
                        </div>
                    </footer>

                    {/* Chatbot (Estilo Suporte de Loja) */}
                    <div className="fixed bottom-6 right-6 z-50 flex flex-col items-end">
                        {isChatOpen && (
                            <div className="bg-white w-[320px] h-[400px] mb-4 rounded-lg flex flex-col border border-gray-200 overflow-hidden card-shadow">
                                <div className="bg-[#001E45] p-3 flex justify-between items-center text-white">
                                    <div className="flex items-center gap-2">
                                        <div className="w-2 h-2 bg-green-400 rounded-full"></div>
                                        <span className="font-semibold text-sm">Atendimento 369</span>
                                    </div>
                                    <button onClick={() => setIsChatOpen(false)} className="text-gray-300 hover:text-white">
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                    </button>
                                </div>
                                
                                <div className="flex-grow p-4 overflow-y-auto text-sm flex flex-col gap-3 bg-gray-50">
                                    {chatMessages.map((msg, index) => (
                                        <div key={index} className={`max-w-[85%] p-2.5 rounded-lg ${msg.sender === 'bot' ? 'bg-white border border-gray-200 text-gray-700 self-start' : 'bg-[#0052CC] text-white self-end'}`}>
                                            {msg.text}
                                        </div>
                                    ))}
                                    
                                    {isTyping && (
                                        <div className="bg-white border border-gray-200 p-2.5 rounded-lg self-start flex gap-1 items-center h-8">
                                            <div className="w-1.5 h-1.5 bg-gray-400 rounded-full typing-dot"></div>
                                            <div className="w-1.5 h-1.5 bg-gray-400 rounded-full typing-dot"></div>
                                            <div className="w-1.5 h-1.5 bg-gray-400 rounded-full typing-dot"></div>
                                        </div>
                                    )}
                                    <div ref={chatEndRef}></div>
                                </div>

                                {!isTyping && (
                                    <div className="p-2 border-t border-gray-200 bg-white flex flex-col gap-1">
                                        {chatOptions.map((opt, i) => (
                                            <button 
                                                key={i} 
                                                onClick={() => handleChatAction(opt)}
                                                className="text-xs text-left px-3 py-2 rounded bg-gray-100 text-gray-700 hover:bg-gray-200 transition-colors"
                                            >
                                                {opt}
                                            </button>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                        
                        <button 
                            onClick={() => setIsChatOpen(!isChatOpen)}
                            className="bg-[#00A650] text-white p-3.5 rounded-full shadow-lg hover:bg-[#008A42] transition-colors flex items-center justify-center"
                        >
                            {isChatOpen ? (
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                            ) : (
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                            )}
                        </button>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
