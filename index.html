    <style>
        * { scrollbar-width: thin; scrollbar-color: #0052CC #F3F4F6; }
        *::-webkit-scrollbar { width: 8px; }
        *::-webkit-scrollbar-track { background: #F3F4F6; }
        *::-webkit-scrollbar-thumb { background: #0052CC; border-radius: 4px; }

        body { overflow-x: hidden; transition: background-color 0.3s, color 0.3s; }
        body.dark-mode { @apply bg-[#0B0F19] text-gray-100; }
        
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); transition: all 0.3s ease; }
        .card-shadow:hover { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.15); transform: translateY(-4px); }

        .float-3d { animation: float 6s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } }

        .glow-bg { position: absolute; border-radius: 50%; z-index: 0; pointer-events: none; opacity: 0.5; }
        
        .glass-panel { background: rgba(255,255,255,0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3); }
        body.dark-mode .glass-panel { background: rgba(30,30,30,0.7); border: 1px solid rgba(255,255,255,0.1); }

        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        .shimmer { animation: shimmer 2s infinite; }
        @keyframes shimmer { 0% { background-position: -1000px 0; } 100% { background-position: 1000px 0; } }

        .pulse-glow { animation: pulse-glow 2s infinite; }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 20px rgba(0,82,204,0.3); } 50% { box-shadow: 0 0 40px rgba(0,82,204,0.6); } }

        .dark-mode-toggle { position: fixed; top: 80px; right: 20px; z-index: 40; }

        .toast { position: fixed; bottom: 20px; right: 20px; z-index: 100; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .stat-card { background: linear-gradient(135deg, #0052CC 0%, #00A650 100%); }
        .stat-card.secondary { background: linear-gradient(135deg, #FF9900 0%, #FF6B35 100%); }
    </style>
</head>

                    setIsTyping(false);

                        'Preços': 'Nossos planos variam de R$ 2.5k/mês (Starter) até soluções Enterprise customizadas. Qual seu perfil?',
                        'Integrar APIs': 'Integramos com +30 serviços: Stripe, WhatsApp, Google Analytics, AWS, Slack, Zapier e mais!',
                        'Técnico': 'Nosso time usa: React, Node.js, Python, PostgreSQL, AWS, Docker, Kubernetes. Qual tecnologia te interessa?'
                    };
                    setChatMessages(prev => [...prev, { sender: 'bot', text: responses[action] || 'Como posso ajudá-lo melhor?' }]);

            const languages = ['Todos', 'PT-BR', 'ES'];

            const filteredEbooks = ebooksData.filter(e => 
                e.title.toLowerCase().includes(searchTerm.toLowerCase()) &&

                (selectedLanguage === 'Todos' || e.language === selectedLanguage)

                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </section>

                        {activeTab === 'precos' && (

                                <div className="p-6 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
                                    <h2 className="text-2xl font-black">Solicitar Orçamento</h2>
                                    <button onClick={() => setShowBudgetForm(false)} className="text-gray-500 hover:text-red-500 bg-gray-100 dark:bg-gray-700 rounded-full p-2">
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                    </button>
                                </div>
                                <form onSubmit={handleBudgetSubmit} className="p-6 space-y-4">
                                    <input type="text" placeholder="Seu nome" className="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 dark:bg-gray-700 focus:ring-2 focus:ring-[#0052CC] outline-none" required />
                                    <input type="email" placeholder="Seu e-mail" className="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 dark:bg-gray-700 focus:ring-2 focus:ring-[#0052CC] outline-none" required />
                                    <select className="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 dark:bg-gray-700 focus:ring-2 focus:ring-[#0052CC] outline-none cursor-pointer" required>
                                        <option value="">Selecione seu segmento</option>
                                        <option>Clínica Médica</option>
                                        <option>Comércio Eletrônico</option>
                                        <option>Fintech</option>
                                        <option>Outro</option>
                                    </select>
                                    <textarea placeholder="Descreva seu projeto..." rows="4" className="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 dark:bg-gray-700 focus:ring-2 focus:ring-[#0052CC] outline-none"></textarea>
                                    <button type="submit" className="w-full bg-[#0052CC] text-white font-bold py-3 rounded-lg hover:bg-blue-800 transition-colors">Enviar Solicitação</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* CHATBOT */}
                    <div className="fixed bottom-6 right-6 z-50 flex flex-col items-end gap-4">
                        {isChatOpen && (
                            <div className="bg-white dark:bg-gray-800 w-[360px] h-[500px] rounded-2xl flex flex-col border border-gray-200 dark:border-gray-700 overflow-hidden shadow-2xl">
                                <div className="bg-gradient-to-r from-[#0052CC] to-[#00A650] p-4 flex justify-between items-center text-white">
                                    <div className="flex items-center gap-2">
                                        <Icons.BotAvatar />
                                        <div>
                                            <h3 className="font-bold">IA Assistant</h3>
                                            <p className="text-[10px] opacity-90 uppercase tracking-widest">Online</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setIsChatOpen(false)} className="text-white hover:bg-white/20 rounded-full p-1 transition-colors">
                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                    </button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-4 space-y-4">
                                    {chatMessages.map((m, i) => (
                                        <div key={i} className={`max-w-[85%] p-3 rounded-2xl text-sm ${m.sender === 'bot' ? 'bg-gray-100 dark:bg-gray-700 text-gray-900 dark:text-white self-start rounded-tl-sm' : 'bg-[#0052CC] text-white self-end rounded-tr-sm'}`}>
                                            {m.text}
                                        </div>
                                    ))}
                                    {isTyping && (
                                        <div className="bg-gray-100 dark:bg-gray-700 p-3 rounded-2xl rounded-tl-sm self-start flex gap-1 items-center h-10 w-16">
                                            <div className="typing-dot w-2 h-2 bg-[#0052CC] rounded-full"></div>
                                            <div className="typing-dot w-2 h-2 bg-[#0052CC] rounded-full"></div>
                                            <div className="typing-dot w-2 h-2 bg-[#0052CC] rounded-full"></div>
                                        </div>
                                    )}
                                    <div ref={chatEndRef}></div>
                                </div>
                                {!isTyping && (
                                    <div className="p-4 border-t border-gray-200 dark:border-gray-700 flex flex-wrap gap-2 bg-gray-50 dark:bg-gray-800/50">
                                        {['Solicitar Orçamento', 'Portfolio', 'Preços', 'Integrar APIs', 'Técnico'].map((opt, i) => (
                                            <button key={i} onClick={() => handleChatAction(opt)} className="text-xs bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 hover:border-[#0052CC] dark:hover:border-[#00A650] hover:text-[#0052CC] dark:hover:text-[#00A650] text-gray-700 dark:text-gray-300 px-3 py-2 rounded-full transition-all font-medium">
                                                {opt}
                                            </button>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                        <button onClick={() => setIsChatOpen(!isChatOpen)} className="bg-gradient-to-r from-[#0052CC] to-[#00A650] text-white p-4 rounded-full shadow-2xl hover:scale-105 transition-transform pulse-glow flex items-center justify-center">
                            {isChatOpen ? <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg> : <Icons.ChatbotBtn />}
                        </button>
                    </div>

                    {/* TOAST NOTIFICATION */}
                    {toast && <Toast {...toast} onClose={() => setToast(null)} />}

                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
